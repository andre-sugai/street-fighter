<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Street Fighter II - SNES</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d32f2f">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #start-btn {
            padding: 20px 50px;
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            background: #d32f2f;
            border: 4px solid #fbc02d;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.6);
            transition: all 0.2s ease;
            font-family: impact, sans-serif;
        }

        #start-btn:hover {
            background: #f44336;
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(244, 67, 54, 0.8);
        }

        #start-btn:active {
            transform: scale(0.95);
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: none; /* Só aparece após o clique no botão Start */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #fff;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #loading p {
            font-size: 16px;
            color: #aaa;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        
        #game {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            position: relative; /* Referência para posições absolutas */
        }
        
        /* OVERRIDE FORÇADO PARA OS CONTROLES VIRTUAIS DO EMULATORJS */

        /* Estilos base para todos os botões */
        div[id^="btn_"] {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: rgba(0, 0, 0, 0.5) !important;
            border: 2px solid rgba(255, 255, 255, 0.6) !important;
            color: rgba(255, 255, 255, 0.9) !important;
            font-family: Arial, sans-serif !important;
            box-sizing: border-box !important;
            position: absolute !important;
            z-index: 1000 !important;
        }

        /* Topo - ESQ (L) e DIR (R) */
        #btn_l, #btn_r {
            top: 8% !important;
            bottom: auto !important;
            width: 90px !important;
            height: 50px !important;
            border-radius: 8px !important;
            font-size: 24px !important;
            font-weight: bold !important;
        }
        #btn_l { left: 5% !important; right: auto !important; }
        #btn_r { right: 5% !important; left: auto !important; }

        /* Direcional - Canto inferior esquerdo */
        #dpad_main {
            left: 5% !important;
            top: 50% !important;
            bottom: auto !important;
            right: auto !important;
            width: 150px !important;
            height: 150px !important;
            position: absolute !important;
            z-index: 1000 !important;
        }

        /* Botões de Ação - Canto inferior direito (Formato Diamante) */
        #btn_y, #btn_x, #btn_a, #btn_b {
            width: 50px !important;
            height: 50px !important;
            border-radius: 50% !important;
            font-size: 20px !important;
            font-weight: bold !important;
        }
        #btn_y { right: 28% !important; top: 60% !important; bottom: auto !important; left: auto !important; margin-left: 0 !important; margin-top: 0 !important; }
        #btn_x { right: 18% !important; top: 45% !important; bottom: auto !important; left: auto !important; margin-left: 0 !important; margin-top: 0 !important; }
        #btn_a { right: 8% !important; top: 60% !important; bottom: auto !important; left: auto !important; margin-left: 0 !important; margin-top: 0 !important; }
        #btn_b { right: 18% !important; top: 75% !important; bottom: auto !important; left: auto !important; margin-left: 0 !important; margin-top: 0 !important; }

        /* Select e Start - Abaixo do direcional */
        #btn_sel, #btn_start {
            top: 85% !important;
            bottom: auto !important;
            height: 30px !important;
            width: 60px !important;
            border-radius: 4px !important;
            font-size: 14px !important;
            font-weight: normal !important;
        }
        #btn_sel { left: 5% !important; right: auto !important; }
        #btn_start { left: 20% !important; right: auto !important; }

        /* Rápido e Lento - Abaixo dos botões de ação */
        #btn_fast, #btn_slow {
            top: 85% !important;
            bottom: auto !important;
            height: 30px !important;
            width: 60px !important;
            border-radius: 4px !important;
            font-size: 14px !important;
            font-weight: normal !important;
        }
        #btn_fast { right: 25% !important; left: auto !important; }
        #btn_slow { right: 8% !important; left: auto !important; }

    </style>
</head>
<body>

    <!-- Overlay do Botão Inicial -->
    <div id="start-overlay">
        <button id="start-btn">INICIAR JOGO</button>
    </div>

    <!-- Tela de Carregamento -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Carregando emulador...</p>
    </div>
    
    <!-- Container do Jogo -->
    <div id="game-container">
        <div id="game"></div>
    </div>
    
    <script>
        // Configuração do EmulatorJS
        EJS_player = '#game';
        EJS_core = 'snes';
        EJS_gameUrl = 'rom.smc'; // Nome do arquivo da ROM
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        
        // Configurações adicionais
        EJS_startOnLoaded = true; // Inicia automaticamente (agora vai funcionar pois só carregará APÓS o clique)
        EJS_fullscreenOnLoaded = true; // Força tela cheia do emulador quando carregado
        EJS_color = '#1a1a2e'; // Cor de fundo
        
        // Habilitar controles virtuais na tela
        EJS_virtualGamepad = true;
        EJS_GameUrl = 'rom.smc';
        
        // Forçar limpeza do cache de layout anterior do EmulatorJS
        try { localStorage.clear(); } catch(e) {}
        
        EJS_VirtualGamepadSettings = [
            // Topo - ESQ e DIR
            { type: "button", id: "btn_l", location: "left", left: "5%", top: "8%", input_value: 10, text: "ESQ" },
            { type: "button", id: "btn_r", location: "right", right: "5%", top: "8%", input_value: 11, text: "DIR" },

            // Direcional - Canto inferior esquerdo
            { type: "dpad", id: "dpad_main", location: "left", left: "5%", top: "50%", inputValues: [4, 5, 6, 7] },

            // Botões de Ação - Canto inferior direito (Formato Diamante)
            { type: "button", id: "btn_y", location: "right", right: "28%", top: "60%", input_value: 9, text: "Y" },
            { type: "button", id: "btn_x", location: "right", right: "18%", top: "45%", input_value: 1, text: "X" },
            { type: "button", id: "btn_a", location: "right", right: "8%", top: "60%", input_value: 0, text: "A" },
            { type: "button", id: "btn_b", location: "right", right: "18%", top: "75%", input_value: 8, text: "B" },

            // Select e Start - Abaixo do direcional
            { type: "button", id: "btn_sel", location: "left", left: "5%", top: "85%", input_value: 2, text: "Select" },
            { type: "button", id: "btn_start", location: "left", left: "20%", top: "85%", input_value: 3, text: "Start" },

            // Rápido e Lento - Abaixo dos botões de ação
            { type: "button", id: "btn_fast", location: "right", right: "25%", top: "85%", input_value: 12, text: "Rápido" },
            { type: "button", id: "btn_slow", location: "right", right: "8%", top: "85%", input_value: 13, text: "Lento" }
        ];
        
        // Função para colocar a janela toda em tela cheia (para mobile e desktop)
        function requestFullScreen(element) {
            if(element.requestFullscreen) {
                element.requestFullscreen().catch(err => {});
            } else if(element.mozRequestFullScreen) { // Firefox
                element.mozRequestFullScreen().catch(err => {});
            } else if(element.webkitRequestFullscreen) { // Chrome, Safari and Opera
                element.webkitRequestFullscreen().catch(err => {});
            } else if(element.msRequestFullscreen) { // IE/Edge
                element.msRequestFullscreen().catch(err => {});
            }
        }

        // Lógica do botão INICIAR JOGO
        document.getElementById('start-btn').addEventListener('click', function() {
            // Tenta forçar a página inteira para tela cheia imediatamente após o clique
            requestFullScreen(document.documentElement);
            
            // Esconde a tela inicial e mostra o loading
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            
            // Injeta o EmulatorJS no momento do clique. 
            // Como isso ocorre num evento de interação do usuário, o navegador permite o áudio fluir livremente!
            var script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            
            // Esconde o modal de loading 3 segundos após o script carregar
            script.onload = function() {
                setTimeout(function() {
                    document.getElementById('loading').style.display = 'none';
                }, 3000);
            };
            
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
