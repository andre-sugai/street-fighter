<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Street Fighter II - SNES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #start-btn {
            padding: 20px 50px;
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            background: #d32f2f;
            border: 4px solid #fbc02d;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.6);
            transition: all 0.2s ease;
            font-family: impact, sans-serif;
        }

        #start-btn:hover {
            background: #f44336;
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(244, 67, 54, 0.8);
        }

        #start-btn:active {
            transform: scale(0.95);
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: none; /* Só aparece após o clique no botão Start */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #fff;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #loading p {
            font-size: 16px;
            color: #aaa;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        
        #game {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <!-- Overlay do Botão Inicial -->
    <div id="start-overlay">
        <button id="start-btn">INICIAR JOGO</button>
    </div>

    <!-- Tela de Carregamento -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Carregando emulador...</p>
    </div>
    
    <!-- Container do Jogo -->
    <div id="game-container">
        <div id="game"></div>
    </div>
    
    <script>
        // Configuração do EmulatorJS
        EJS_player = '#game';
        EJS_core = 'snes';
        EJS_gameUrl = 'rom.smc'; // Nome do arquivo da ROM
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        
        // Configurações adicionais
        EJS_startOnLoaded = true; // Inicia automaticamente (agora vai funcionar pois só carregará APÓS o clique)
        EJS_color = '#1a1a2e'; // Cor de fundo
        
        // Habilitar controles virtuais na tela
        EJS_virtualGamepad = true;
        EJS_GameUrl = 'rom.smc';
        
        EJS_VirtualGamepadSettings = [
            { type: "dpad", location: "left", left: "10%", bottom: "10%", width: "150px", height: "150px", inputValues: [4, 5, 6, 7] },
            { type: "button", location: "right", right: "20%", bottom: "20%", width: "50px", height: "50px", input_value: 0, text: "A" },
            { type: "button", location: "right", right: "30%", bottom: "10%", width: "50px", height: "50px", input_value: 8, text: "B" },
            { type: "button", location: "right", right: "10%", bottom: "30%", width: "50px", height: "50px", input_value: 1, text: "X" },
            { type: "button", location: "right", right: "20%", bottom: "40%", width: "50px", height: "50px", input_value: 9, text: "Y" },
            { type: "button", location: "bottom", left: "40%", bottom: "10%", width: "60px", height: "30px", input_value: 2, text: "SELECT" },
            { type: "button", location: "bottom", left: "55%", bottom: "10%", width: "60px", height: "30px", input_value: 3, text: "START" },
            { type: "button", location: "top", left: "5%", top: "10%", width: "80px", height: "40px", input_value: 10, text: "L" },
            { type: "button", location: "top", right: "5%", top: "10%", width: "80px", height: "40px", input_value: 11, text: "R" }
        ];
        
        // Lógica do botão INICIAR JOGO
        document.getElementById('start-btn').addEventListener('click', function() {
            // Esconde a tela inicial e mostra o loading
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            
            // Injeta o EmulatorJS no momento do clique. 
            // Como isso ocorre num evento de interação do usuário, o navegador permite o áudio fluir livremente!
            var script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            
            // Esconde o modal de loading 3 segundos após o script carregar
            script.onload = function() {
                setTimeout(function() {
                    document.getElementById('loading').style.display = 'none';
                }, 3000);
            };
            
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
